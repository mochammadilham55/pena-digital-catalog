<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keranjang — PenaDigital</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1B3A6B">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--navy:#1B3A6B;--navy2:#2A4F8F;--orange:#E07B2A;--orange2:#F5A040;--cream:#F5EFE6;--cream2:#EDE4D6;--white:#fff;--g50:#F8FAFC;--g100:#F1F5F9;--g200:#E2E8F0;--g300:#CBD5E1;--g500:#64748B;--g700:#334155;--red:#DC2626;--red-bg:#FEE2E2;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--cream);color:var(--g700);min-height:100vh;}
header{background:var(--navy);padding:14px 20px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2);}
.logo-box{width:38px;height:38px;background:var(--cream);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.logo-box svg{width:24px;height:24px;}
.brand-name{font-size:16px;font-weight:800;color:#fff;}
.hspacer{flex:1;}
.back-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:7px 12px;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:5px;}

.main{max-width:560px;margin:0 auto;padding:20px 16px 100px;}
.page-title{font-size:18px;font-weight:800;color:var(--navy);margin-bottom:16px;display:flex;align-items:center;gap:8px;}

/* ITEM */
.cart-item{background:var(--white);border-radius:14px;border:1px solid var(--cream2);padding:14px;display:flex;gap:12px;margin-bottom:10px;}
.item-foto{width:64px;height:64px;border-radius:8px;overflow:hidden;flex-shrink:0;background:var(--g100);display:flex;align-items:center;justify-content:center;}
.item-foto img{width:100%;height:100%;object-fit:cover;}
.item-info{flex:1;min-width:0;}
.item-nama{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:3px;}
.item-variasi{font-size:11px;color:var(--g500);font-weight:500;margin-bottom:6px;}
.item-harga{font-size:14px;font-weight:800;color:var(--orange);}
.item-actions{display:flex;align-items:center;gap:8px;margin-top:8px;}
.qty-btn{width:28px;height:28px;border-radius:6px;border:1.5px solid var(--g200);background:var(--g50);font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--g700);transition:all .15s;}
.qty-btn:hover{border-color:var(--navy);color:var(--navy);}
.qty-val{font-size:14px;font-weight:800;color:var(--navy);min-width:24px;text-align:center;}
.btn-hapus{margin-left:auto;background:var(--red-bg);color:var(--red);border:none;border-radius:6px;width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;}
.btn-hapus:hover{background:#FCA5A5;}

/* RINGKASAN */
.ringkasan-card{background:var(--white);border-radius:14px;border:1px solid var(--cream2);padding:18px;margin-bottom:14px;}
.ringkasan-title{font-size:13px;font-weight:800;color:var(--navy);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px;}
.ringkasan-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;margin-bottom:8px;color:var(--g700);}
.ringkasan-row:last-child{margin-bottom:0;padding-top:12px;border-top:2px solid var(--cream2);font-size:16px;font-weight:800;color:var(--navy);}
.ringkasan-row:last-child span:last-child{color:var(--orange);}

/* EMPTY */
.empty-cart{text-align:center;padding:60px 20px;}
.empty-cart svg{width:56px;height:56px;color:var(--g300);margin-bottom:16px;}
.empty-cart h3{font-size:18px;font-weight:800;color:var(--navy);margin-bottom:8px;}
.empty-cart p{font-size:14px;color:var(--g500);margin-bottom:20px;}
.btn-belanja{display:inline-flex;align-items:center;gap:6px;padding:12px 24px;background:var(--orange);color:#fff;border-radius:10px;text-decoration:none;font-weight:700;font-size:14px;}

/* AKSI BAWAH */
.aksi-bottom{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--cream2);padding:12px 16px;z-index:50;box-shadow:0 -4px 20px rgba(0,0,0,.08);}
.btn-checkout{width:100%;padding:15px;border-radius:12px;background:var(--orange);color:#fff;border:none;font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 2px 12px rgba(224,123,42,.35);transition:background .15s;}
.btn-checkout:hover{background:#C96E1F;}
.btn-checkout:disabled{background:var(--g300);cursor:not-allowed;box-shadow:none;}
</style>
</head>
<body>

<header>
  <button onclick="goBackOrHome()" class="back-btn" style="background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);width:34px;height:34px;padding:0;display:flex;align-items:center;justify-content:center;cursor:pointer;">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
  </button>
  <div class="logo-box" style="margin-left:8px;">
    <svg viewBox="0 0 24 24" fill="none"><rect x="2" y="2" width="20" height="20" rx="5" stroke="#E07B2A" stroke-width="2.2"/><path d="M12 4L9 12H12L10.5 20L18 11H13.5L16 4H12Z" fill="#1B3A6B"/><circle cx="12" cy="15.5" r="1.2" fill="#E07B2A"/></svg>
  </div>
  <span class="brand-name">Keranjang Belanja</span>
  <div class="hspacer"></div>
  <a href="index.html" class="back-btn">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
    Beranda
  </a>
</header>

<div class="main">
  <div class="page-title">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
    Keranjang Saya
  </div>
  <div id="cart-content"></div>
</div>

<div class="aksi-bottom" id="aksi-bottom" style="display:none;">
  <button class="btn-checkout" onclick="keCheckout()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    Lanjut ke Pembayaran
  </button>
</div>

<script>
function getCart(){ try{ return JSON.parse(localStorage.getItem('pd_cart')||'[]'); }catch{ return []; } }
function saveCart(cart){ localStorage.setItem('pd_cart', JSON.stringify(cart)); renderCart(); }

function toImgUrl(url) {
  if (!url) return '';
  if (url.includes('uc?export=view')) return url;
  const m = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (m) return `https://drive.google.com/uc?export=view&id=${m[1]}`;
  return url;
}
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function goBackOrHome() {
  if (document.referrer && document.referrer.includes(location.host)) {
    history.back();
  } else {
    location.href = 'index.html';
  }
}

function renderCart() {
  const cart    = getCart();
  const content = document.getElementById('cart-content');
  const aksi    = document.getElementById('aksi-bottom');

  if (!cart.length) {
    content.innerHTML = `
      <div class="empty-cart">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        <h3>Keranjang Kosong</h3>
        <p>Belum ada produk di keranjang Anda.</p>
        <a href="index.html" class="btn-belanja">🛍️ Mulai Belanja</a>
      </div>`;
    aksi.style.display = 'none';
    return;
  }

  const total = cart.reduce((s,i) => s + (parseInt(i.harga)*(i.qty||1)), 0);
  const jumlah = cart.reduce((s,i) => s + (i.qty||1), 0);

  content.innerHTML = cart.map((item, idx) => `
    <div class="cart-item">
      <div class="item-foto">
        ${item.foto_url
          ? `<img src="${toImgUrl(esc(item.foto_url))}" alt="${esc(item.nama)}" onerror="this.style.display='none'">`
          : `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#CBD5E1" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>`}
      </div>
      <div class="item-info">
        <div class="item-nama">${esc(item.nama)}</div>
        ${item.variasi ? `<div class="item-variasi">📌 ${esc(item.variasi)}</div>` : ''}
        <div class="item-harga">Rp ${(parseInt(item.harga)*(item.qty||1)).toLocaleString('id-ID')}</div>
        <div class="item-actions">
          <button class="qty-btn" onclick="ubahQty(${idx},-1)">−</button>
          <span class="qty-val">${item.qty||1}</span>
          <button class="qty-btn" onclick="ubahQty(${idx},1)">+</button>
          <button class="btn-hapus" onclick="hapusItem(${idx})" title="Hapus">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
          </button>
        </div>
      </div>
    </div>
  `).join('') + `
    <div class="ringkasan-card">
      <div class="ringkasan-title">Ringkasan Pesanan</div>
      <div class="ringkasan-row"><span>${jumlah} produk</span><span>Rp ${total.toLocaleString('id-ID')}</span></div>
      <div class="ringkasan-row"><span>Pengiriman</span><span style="color:#16A34A;">Gratis (Digital)</span></div>
      <div class="ringkasan-row"><span>Total</span><span>Rp ${total.toLocaleString('id-ID')}</span></div>
    </div>`;

  aksi.style.display = 'block';
}

function ubahQty(idx, delta) {
  const cart = getCart();
  cart[idx].qty = Math.max(1, (cart[idx].qty||1) + delta);
  saveCart(cart);
}

function hapusItem(idx) {
  const cart = getCart();
  cart.splice(idx, 1);
  saveCart(cart);
}

function keCheckout() {
  location.href = 'checkout.html';
}

renderCart();
</script>
</body>
</html>
