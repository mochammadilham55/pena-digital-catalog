<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout — PenaDigital</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1B3A6B">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--navy:#1B3A6B;--orange:#E07B2A;--cream:#F5EFE6;--cream2:#EDE4D6;--white:#fff;--g50:#F8FAFC;--g100:#F1F5F9;--g200:#E2E8F0;--g300:#CBD5E1;--g500:#64748B;--g700:#334155;--green:#16A34A;--red:#DC2626;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--cream);color:var(--g700);min-height:100vh;}
header{background:var(--navy);padding:14px 20px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 12px rgba(0,0,0,.2);}
.logo-box{width:38px;height:38px;background:var(--cream);border-radius:8px;display:flex;align-items:center;justify-content:center;}
.logo-box svg{width:24px;height:24px;}
.brand-name{font-size:16px;font-weight:800;color:#fff;}
.main{max-width:560px;margin:0 auto;padding:20px 16px 40px;}
.section-card{background:var(--white);border-radius:14px;border:1px solid var(--cream2);padding:20px;margin-bottom:16px;}
.sec-title{font-size:13px;font-weight:800;color:var(--navy);text-transform:uppercase;letter-spacing:.5px;margin-bottom:16px;display:flex;align-items:center;gap:6px;}
.sec-title::before{content:'';width:3px;height:14px;background:var(--orange);border-radius:2px;display:inline-block;}
.form-group{margin-bottom:14px;}
.form-label{font-size:12px;font-weight:700;color:var(--navy);display:block;margin-bottom:6px;}
.form-input{width:100%;padding:12px 14px;border:1.5px solid var(--g200);border-radius:10px;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;color:var(--g700);background:var(--g50);outline:none;transition:border-color .2s,box-shadow .2s;}
.form-input:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(224,123,42,.1);}
.form-hint{font-size:11px;color:var(--g500);margin-top:4px;}

/* Order summary items */
.order-item{display:flex;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid var(--cream2);}
.order-item:last-child{border-bottom:none;}
.order-item-foto{width:48px;height:48px;border-radius:7px;overflow:hidden;background:var(--g100);flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.order-item-foto img{width:100%;height:100%;object-fit:cover;}
.order-item-info{flex:1;min-width:0;}
.order-item-nama{font-size:13px;font-weight:700;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.order-item-var{font-size:11px;color:var(--g500);}
.order-item-harga{font-size:13px;font-weight:800;color:var(--orange);flex-shrink:0;}

/* Total */
.total-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:6px 0;}
.total-row.final{font-size:16px;font-weight:800;color:var(--navy);padding-top:12px;border-top:2px solid var(--cream2);margin-top:4px;}
.total-row.final span:last-child{color:var(--orange);}

/* TnC */
.tnc-check{display:flex;align-items:flex-start;gap:10px;margin-top:4px;}
.tnc-check input{margin-top:2px;accent-color:var(--orange);width:16px;height:16px;flex-shrink:0;}
.tnc-check label{font-size:12px;color:var(--g500);line-height:1.5;}
.tnc-check a{color:var(--orange);font-weight:600;text-decoration:none;}

/* Btn Bayar */
.btn-bayar{width:100%;padding:16px;border-radius:12px;background:var(--orange);color:#fff;border:none;font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 3px 14px rgba(224,123,42,.4);transition:background .15s;margin-top:16px;}
.btn-bayar:hover{background:#C96E1F;}
.btn-bayar:disabled{background:var(--g300);cursor:not-allowed;box-shadow:none;}
.spin{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:none;}
@keyframes spin{to{transform:rotate(360deg)}}

/* Keamanan */
.security-note{text-align:center;font-size:11px;color:var(--g500);margin-top:12px;display:flex;align-items:center;justify-content:center;gap:5px;}

/* Error */
.err-msg{background:#FEE2E2;border:1px solid #FECACA;color:var(--red);border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:12px;display:none;}
</style>
</head>
<body>

<header>
  <button onclick="goBackOrHome()" style="width:34px;height:34px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
  </button>
  <div class="logo-box" style="margin-left:8px;">
    <img src="https://res.cloudinary.com/dnksb0xpy/image/upload/v1782532301/6e9671ed-082b-4fe0-a7a0-6cec31b30e92_ruxq3l.jpg" alt="PenaDigital" style="width:100%;height:100%;object-fit:cover;">
  </div>
  <span class="brand-name">Checkout</span>
  <div style="flex:1;"></div>
  <a href="index.html" style="width:34px;height:34px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;text-decoration:none;">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
  </a>
</header>

<div class="main">

  <!-- RINGKASAN PESANAN -->
  <div class="section-card">
    <div class="sec-title">Ringkasan Pesanan</div>
    <div id="order-items"></div>

    <!-- KODE REFERRAL -->
    <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--cream2);">
      <label class="form-label" style="margin-bottom:6px;display:block;">Punya Kode Referral?</label>
      <div style="display:flex;gap:8px;">
        <input id="f-referral" class="form-input" type="text" placeholder="Masukkan kode (opsional)" style="text-transform:uppercase;letter-spacing:.5px;flex:1;">
        <button type="button" onclick="cekReferral()" id="btn-cek-referral" style="padding:11px 16px;background:var(--navy);color:#fff;border:none;border-radius:10px;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;">Terapkan</button>
      </div>
      <div id="referral-msg" style="font-size:12px;margin-top:6px;display:none;"></div>
    </div>

    <div style="margin-top:12px;">
      <div class="total-row"><span>Subtotal</span><span id="subtotal">Rp 0</span></div>
      <div class="total-row" id="diskon-row" style="display:none;color:var(--green);"><span>Diskon Referral</span><span id="diskon-amount">-Rp 0</span></div>
      <div class="total-row"><span>Pengiriman</span><span style="color:var(--green);">Gratis (Digital)</span></div>
      <div class="total-row final"><span>Total Pembayaran</span><span id="total-final">Rp 0</span></div>
    </div>
  </div>

  <!-- DATA PEMBELI -->
  <div class="section-card">
    <div class="sec-title">Data Penerima</div>
    <div class="err-msg" id="err-msg"></div>

    <div class="form-group">
      <label class="form-label" for="f-nama">Nama Lengkap *</label>
      <input id="f-nama" class="form-input" type="text" placeholder="contoh: Budi Santoso, S.Pd">
    </div>
    <div class="form-group">
      <label class="form-label" for="f-email">Alamat Email *</label>
      <input id="f-email" class="form-input" type="email" placeholder="email@gmail.com">
      <div class="form-hint">Link produk akan dikirim ke email ini</div>
    </div>
    <div class="form-group">
      <label class="form-label" for="f-wa">Nomor WhatsApp *</label>
      <input id="f-wa" class="form-input" type="tel" placeholder="08xxxxxxxxxx">
      <div class="form-hint">Link produk juga dikirim via WhatsApp</div>
    </div>

    <div class="tnc-check">
      <input type="checkbox" id="cb-tnc">
      <label for="cb-tnc">
        Saya telah membaca dan menyetujui
        <a href="tnc.html" target="_blank">Syarat & Ketentuan</a> serta
        <a href="refund.html" target="_blank">Kebijakan Pengembalian Dana</a> PenaDigital.
      </label>
    </div>

    <button class="btn-bayar" id="btn-bayar" onclick="prosesBayar()">
      <div class="spin" id="spin"></div>
      <svg id="btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
      <span id="btn-txt">Bayar Sekarang</span>
    </button>

    <div class="security-note">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      Pembayaran aman diproses oleh Midtrans
    </div>
  </div>

</div>

<!-- Midtrans Snap.js -->
<script src="https://app.midtrans.com/snap/snap.js" data-client-key="Mid-client-tSZ9jlbMfd4FzuOA"></script>

<script>
const API = 'https://pena-digital-backend.vercel.app/api/public';

function getCart(){ try{ return JSON.parse(localStorage.getItem('pd_cart')||'[]'); }catch{ return []; } }
function toImgUrl(url){
  if(!url) return '';
  if(url.includes('uc?export=view')) return url;
  const m=url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if(m) return `https://drive.google.com/uc?export=view&id=${m[1]}`;
  return url;
}
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function goBackOrHome() {
  if (document.referrer && document.referrer.includes(location.host)) {
    history.back();
  } else {
    location.href = 'cart.html';
  }
}

let referralAktif = null; // {kode, diskon}

function renderRingkasan() {
  const cart  = getCart();
  if (!cart.length) { location.href = 'cart.html'; return; }

  const total = cart.reduce((s,i) => s + (parseInt(i.harga)*(i.qty||1)), 0);

  document.getElementById('order-items').innerHTML = cart.map(item => `
    <div class="order-item">
      <div class="order-item-foto">
        ${item.foto_url
          ? `<img src="${toImgUrl(esc(item.foto_url))}" alt="${esc(item.nama)}" onerror="this.style.display='none'">`
          : `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#CBD5E1" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>`}
      </div>
      <div class="order-item-info">
        <div class="order-item-nama">${esc(item.nama)}</div>
        ${item.variasi ? `<div class="order-item-var">${esc(item.variasi)} × ${item.qty||1}</div>` : `<div class="order-item-var">× ${item.qty||1}</div>`}
      </div>
      <div class="order-item-harga">Rp ${(parseInt(item.harga)*(item.qty||1)).toLocaleString('id-ID')}</div>
    </div>
  `).join('');

  document.getElementById('subtotal').textContent = `Rp ${total.toLocaleString('id-ID')}`;
  updateTotalTampil();
}

function updateTotalTampil() {
  const cart     = getCart();
  const subtotal = cart.reduce((s,i) => s + (parseInt(i.harga)*(i.qty||1)), 0);
  const diskon   = referralAktif ? referralAktif.diskon : 0;
  const total    = Math.max(1000, subtotal - diskon);

  document.getElementById('total-final').textContent = `Rp ${total.toLocaleString('id-ID')}`;

  const diskonRow = document.getElementById('diskon-row');
  if (referralAktif && diskon > 0) {
    diskonRow.style.display = 'flex';
    document.getElementById('diskon-amount').textContent = `-Rp ${diskon.toLocaleString('id-ID')}`;
  } else {
    diskonRow.style.display = 'none';
  }
}

async function cekReferral() {
  const kode = document.getElementById('f-referral').value.trim().toUpperCase();
  const msgEl = document.getElementById('referral-msg');

  if (!kode) {
    referralAktif = null;
    updateTotalTampil();
    msgEl.style.display = 'none';
    return;
  }

  const cart     = getCart();
  const subtotal = cart.reduce((s,i) => s + (parseInt(i.harga)*(i.qty||1)), 0);

  const btn = document.getElementById('btn-cek-referral');
  btn.disabled = true;
  btn.textContent = 'Mengecek...';

  try {
    const r = await fetch(`${API}/referral/validasi`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ kode, subtotal })
    });
    const d = await r.json();

    if (d.status === 'ok') {
      referralAktif = { kode: d.kode, diskon: d.diskon };
      msgEl.style.display = 'block';
      msgEl.style.color = 'var(--green)';
      msgEl.textContent = `✅ Kode "${d.kode}" diterapkan! Hemat Rp ${d.diskon.toLocaleString('id-ID')}`;
    } else {
      referralAktif = null;
      msgEl.style.display = 'block';
      msgEl.style.color = 'var(--red)';
      msgEl.textContent = `❌ ${d.message || 'Kode tidak valid.'}`;
    }
    updateTotalTampil();
  } catch {
    msgEl.style.display = 'block';
    msgEl.style.color = 'var(--red)';
    msgEl.textContent = '❌ Gagal memeriksa kode. Coba lagi.';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Terapkan';
  }
}

function setLoad(on) {
  document.getElementById('btn-bayar').disabled = on;
  document.getElementById('spin').style.display = on ? 'block' : 'none';
  document.getElementById('btn-icon').style.display = on ? 'none' : 'block';
  document.getElementById('btn-txt').textContent = on ? 'Memproses...' : 'Bayar Sekarang';
}

function tampilErr(msg) {
  const el = document.getElementById('err-msg');
  el.textContent = msg;
  el.style.display = 'block';
  el.scrollIntoView({ behavior:'smooth', block:'center' });
}

async function prosesBayar() {
  document.getElementById('err-msg').style.display = 'none';

  const nama  = document.getElementById('f-nama').value.trim();
  const email = document.getElementById('f-email').value.trim();
  const wa    = document.getElementById('f-wa').value.trim();
  const tnc   = document.getElementById('cb-tnc').checked;

  if (!nama)  return tampilErr('Nama lengkap wajib diisi.');
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return tampilErr('Format email tidak valid.');
  if (!wa || wa.length < 10) return tampilErr('Nomor WhatsApp tidak valid.');
  if (!tnc) return tampilErr('Anda harus menyetujui Syarat & Ketentuan terlebih dahulu.');

  const cart = getCart();
  if (!cart.length) return tampilErr('Keranjang kosong.');

  setLoad(true);
  try {
    // Buat transaksi di backend
    const r = await fetch(`${API}/midtrans/create-transaction`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        customer_name:  nama,
        customer_email: email,
        customer_wa:    wa,
        kode_referral:  referralAktif ? referralAktif.kode : '',
        items: cart.map(i => ({
          produk_id: i.produk_id,
          nama:      i.nama,
          variasi:   i.variasi || '',
          harga:     parseInt(i.harga),
          qty:       i.qty || 1
        }))
      })
    });
    const d = await r.json();
    if (d.status !== 'ok') { tampilErr(d.message || 'Gagal membuat transaksi.'); setLoad(false); return; }

    // Simpan order_id untuk halaman sukses
    localStorage.setItem('pd_last_order', d.order_id);
    localStorage.setItem('pd_customer_wa', wa);

    // Buka Midtrans Snap
    window.snap.pay(d.snap_token, {
      onSuccess: function(result) {
        localStorage.removeItem('pd_cart');
        location.href = `success.html?order_id=${d.order_id}&status=success`;
      },
      onPending: function(result) {
        location.href = `success.html?order_id=${d.order_id}&status=pending`;
      },
      onError: function(result) {
        tampilErr('Pembayaran gagal. Silakan coba lagi.');
        setLoad(false);
      },
      onClose: function() {
        setLoad(false);
      }
    });

  } catch(e) {
    tampilErr('Tidak dapat terhubung ke server. Periksa koneksi internet Anda.');
    setLoad(false);
  }
}

renderRingkasan();
</script>
</body>
</html>
